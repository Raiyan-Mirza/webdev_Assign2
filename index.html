<!DOCTYPE html>
<html>
<head>
<title>Weather App</title>
<link rel="stylesheet" href="index.css">
</head>

<body>

<h2 class="title">Weather App</h2>

<div class="main">

    <div class="box leftBox">

        <h4>Search City</h4>

        <input type="text" id="cityInput" class="inputBox">

        <button class="button" onclick="searchWeather()">Search</button>

        <h4>History</h4>

        <div id="historyBox"></div>

    </div>

    <div class="box rightBox">

        <h4>Weather Info</h4>

        <p>City: <span id="cityText"></span></p>
        <p>Temp: <span id="tempText"></span></p>
        <p>Weather: <span id="weatherText"></span></p>
        <p>Humidity: <span id="humidityText"></span></p>
        <p>Wind: <span id="windText"></span></p>

    </div>

</div>

<script src="index.js"></script>

</body>
</html>
