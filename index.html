<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=  , initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="index.css">
</head>
<body>
    <h1 id="head">Async Weather Tracker</h1><br><br>
    <div class="container">
        <div id="search" class="left">
            <input type="text" id="text" placeholder="enter city">
        
            <button type="submit" id="btn">Submit</button>

        </div>
        <div id="Weatherinfo" class="right">
        <h1 id="weatherinfo">Weather Info</h1>
        <p id="city" class="info">City </p>
        <p id="temp" class="info">temp Degree</p>
        <p id="weather" class=info>Mist</p>
        <p id="humidity" class="info">80%</p>
        <p id="windspeed" class="info">2.5 m/s</p>
        </div>
        <div id="history">Search History</div>
    </div>
</body>
<script src="index.js"></script>
</html>
